# ---------------------------------------------------------------------------
# Where you commute from. Default is Brussels city centre as you asked; change
# the coordinates if you'd rather measure from your actual home.
# ---------------------------------------------------------------------------
origin:
  name: Brussels
  lat: 50.8503
  lon: 4.3517

radius_km: 550          # commute / duty-station radius. Bumped from 500 to 550
                        # so Geneva (533 km, a major UN hub) is included. Set
                        # back to 500 for strict; remote jobs are kept at any
                        # distance regardless of this number.
lookback_days: 8        # weekly run + 1 day buffer (stateless dedup window)

# ---------------------------------------------------------------------------
# Known duty stations and their coordinates. The script measures each against
# the origin and KEEPS a job only if its station is within radius_km (or the
# job is remote). Cities beyond the radius are listed for clarity and will be
# dropped automatically. Add any others you care about.
#   Within ~500 km of Brussels:  NATO (Brussels), OECD/EUISS (Paris),
#   IMO (London), Council of Europe (Strasbourg), Europol (The Hague),
#   UN Bonn, ECB (Frankfurt), many UN Geneva roles.
#   Out of range: OSCE (Vienna ~915 km), Rome, Madrid, Warsaw, Copenhagen,
#   New York, Nairobi -> only surface if explicitly remote.
# ---------------------------------------------------------------------------
duty_stations:
  Brussels:    [50.8503, 4.3517]
  Antwerp:     [51.2194, 4.4025]
  Ghent:       [51.0543, 3.7174]
  The Hague:   [52.0705, 4.3007]
  Amsterdam:   [52.3676, 4.9041]
  Luxembourg:  [49.6116, 6.1319]
  Paris:       [48.8566, 2.3522]
  Lille:       [50.6292, 3.0573]
  Strasbourg:  [48.5734, 7.7521]
  London:      [51.5074, -0.1278]
  Bonn:        [50.7374, 7.0982]
  Cologne:     [50.9375, 6.9603]
  Frankfurt:   [50.1109, 8.6821]
  Geneva:      [46.2044, 6.1432]
  # --- below here is beyond 500 km; kept only for label clarity ---
  Vienna:      [48.2082, 16.3738]
  Rome:        [41.9028, 12.4964]

remote_terms:
  - remote
  - home-based
  - home based
  - homebased
  - telework
  - teleworking

# Countries whose relevant duty stations sit within the radius. If a job is
# tagged with one of these but no specific city (e.g. just "Belgium"), it is
# kept rather than dropped. Big countries map mostly to their in-range IO hub
# cities (Paris, Bonn, Geneva, London), so this is a reasonable approximation.
accept_countries:
  - Belgium
  - Netherlands
  - Luxembourg
  - France
  - Germany
  - Switzerland
  - United Kingdom

# Words that nudge a job UP in ranking. Front-loaded with your dataviz target.
keywords_boost:
  - data visualisation
  - data visualization
  - information visualisation
  - information visualization
  - data designer
  - data design
  - dataviz
  - data viz
  - information design
  - data storytelling
  - infographic
  - visualisation
  - visualization
  - data
  - communication
  - communications
  - digital
  - editorial
  - web
  - content
  - multimedia

# FOCUS DIAL. Leave EMPTY (the default) to see every role within range. To get
# a strictly dataviz digest, uncomment the terms below: a job must then match
# at least one of them to appear. This is the knob for "too loose vs too tight".
keywords_require: []
  # - data visualisation
  # - data visualization
  # - information visualisation
  # - information visualization
  # - data designer
  # - dataviz
  # - data viz
  # - information design
  # - data storytelling
  # - infographic

# Words that drop a job outright.
keywords_exclude:
  - driver
  - security guard
  - nurse
  - medical officer
  - cleaner

# ---------------------------------------------------------------------------
# Source 1: ReliefWeb -- free JSON API, works immediately. Skews humanitarian
# but indexes a lot of UN. From Nov 2025 ReliefWeb asks for a pre-approved
# appname; the placeholder below works for low-volume personal use, but if you
# get throttled, email feedback@reliefweb.int to register one.
# ---------------------------------------------------------------------------
reliefweb:
  enabled: true
  appname: brussels-io-roundup
  countries:
    - Belgium
    - Netherlands
    - Luxembourg
    - France
    - United Kingdom of Great Britain and Northern Ireland
    - Germany
    - Switzerland

# ---------------------------------------------------------------------------
# Source 2: RSS feeds. These cover the institutions ReliefWeb misses
# (NATO, OECD, OSCE, EU, Council of Europe...) and are where your dataviz roles
# will actually come from.
#
# >>> DO THIS to switch on the dataviz feed (about 60 seconds) <<<
#   1. Go to https://unjoblist.org/s
#   2. In the search box, type:  data visualization
#      (the site searches job titles; run it once to confirm you get hits)
#   3. On the results page, copy the page URL -- the search is stored in it,
#      e.g.  https://unjoblist.org/s?q=data+visualization
#   4. Find the RSS link/icon on that results page and copy the FEED url
#      (it's the same search as an XML feed). Paste it into `url` below.
#   5. Set enabled: true. Repeat for other terms (information design, etc.)
#
# If you can't spot the RSS link, the page URL itself often works with
# feedparser; try it with enabled: true and check the Actions log -- if it
# returns 0 entries, the explicit feed URL is the fix.
# ---------------------------------------------------------------------------
rss_feeds:
  - name: "UNjobList - data visualization"
    org: ""
    url: "https://unjoblist.org/s?q=data+visualization"   # <-- replace with the RSS feed URL
    enabled: false                                         # <-- flip to true once confirmed

  - name: "UNjobList - information design"
    org: ""
    url: "https://unjoblist.org/s?q=information+design"    # <-- replace with the RSS feed URL
    enabled: false

  # EU agencies expose a "Latest job vacancies" RSS feed on their websites
  # (e.g. EU-OSHA at osha.europa.eu). Add the ones you care about here, one per
  # line, with the vacancy-feed URL from each agency's RSS page.
  # - name: "EU-OSHA vacancies"
  #   url: "https://osha.europa.eu/en/rss/..."   # confirm exact feed URL
  #   enabled: false

# ---------------------------------------------------------------------------
# Optional LLM relevance pass. Off by default. If enabled AND an
# ANTHROPIC_API_KEY env var is present, borderline matches are filtered against
# this profile description with a cheap model. Failures are non-fatal.
# ---------------------------------------------------------------------------
llm:
  enabled: false
  profile: >
    Digital communications and data-visualisation professional in EU/international
    policy settings. Strengths: web publishing, editorial/content, data viz,
    AI governance, multilingual (EN/FR/DE). Interested in communications, digital,
    knowledge-management, data, and policy-adjacent roles at public institutions.
